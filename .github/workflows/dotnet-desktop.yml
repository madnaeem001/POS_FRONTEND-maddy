name: Build and Package WPF Application

on:
  push:
    branches: [ "main" ] # Change "main" if your branch name is different
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: POS_FRONTEND.sln                        # Replace with your solution file name
      Test_Project_Path: POS_FRONTEND.Tests\POS_FRONTEND.Tests.csproj # If you have unit tests, specify the path
      Wap_Project_Directory: POS_FRONTEND.Package            # Path to WAP project directory
      Wap_Project_Path: POS_FRONTEND.Package\POS_FRONTEND.Package.wapproj # Path to the WAP project file

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Adjust the version to match your project

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Build Solution
      run: msbuild ${{ env.Solution_Name }} /p:Configuration=${{ matrix.configuration }}

    # If you have unit tests, uncomment the following step
    - name: Run Unit Tests
      run: dotnet test ${{ env.Test_Project_Path }} --configuration ${{ matrix.configuration }}

    # Decode and set up signing certificate
    - name: Decode Signing Certificate
      run: |
        $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
        $certificatePath = Join-Path -Path $env:Wap_Project_Directory -ChildPath GitHubActionsWorkflow.pfx
        [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)
      shell: pwsh

    # Package the WPF application
    - name: Package Application
      run: msbuild ${{ env.Wap_Project_Path }} /p:Configuration=${{ matrix.configuration }} /p:UapAppxPackageBuildMode=$env:Appx_Package_Build_Mode /p:AppxBundle=$env:Appx_Bundle /p:PackageCertificateKeyFile=$env:Wap_Project_Directory\GitHubActionsWorkflow.pfx /p:PackageCertificatePassword=${{ secrets.Pfx_Key }}
      env:
        Appx_Bundle: Always
        Appx_Package_Build_Mode: StoreUpload
        Configuration: ${{ matrix.configuration }}

    # Remove sensitive files
    - name: Clean Up Signing Certificate
      run: Remove-Item -path $env:Wap_Project_Directory\GitHubActionsWorkflow.pfx
      shell: pwsh

    # Upload build artifacts
    - name: Upload Package
      uses: actions/upload-artifact@v3
      with:
        name: WPF Application Package
        path: ${{ env.Wap_Project_Directory }}\AppPackages
